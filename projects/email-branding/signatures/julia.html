<!DOCTYPE html>

<head>

<!--
  ===========================================================================
  JK ACCOUNTING GROUP — EMAIL SIGNATURE  ·  Julia Kononova
  ---------------------------------------------------------------------------
  Recreates the firm's old email card on the Design System. Email-safe and
  hardened for real inboxes: table + inline CSS only, an explicit light card
  surface so the dark-teal palette stays legible even in dark mode, and
  Outlook/Word-engine fixes (mso-* hints, bulletproof bronze button).

  Composition: portrait photo (left) · details (center) · Medallion seal (right).
  Bronze is used exactly once — the booking button. Fonts fall back to Georgia
  + Arial + Courier in Gmail/Outlook; the brand is carried by color, layout,
  photo and logo, which all hold.

  FILL THESE IN (search for "{{" to be sure none remain):
    {{PHOTO_URL}}    Public HTTPS URL of Julia's portrait — cropped 4:5, warm
                     grade (~160x200 for retina). NO PHOTO YET? drop in the
                     hosted teal "JK" monogram PNG instead — never a stock/AI
                     face. (If left empty, the cell already shows a teal panel.)
    {{LOGO_URL}}     Public HTTPS URL of the Medallion PNG (hosted). Use
                     brand/logo/png/JK-medallion-primary-512.png — the PRIMARY
                     (teal) seal, NOT the reversed one (the card is light).
                     Never the .svg (email can't render SVG).
    {{BOOKING_URL}}  Full booking link (e.g. https://calendly.com/jkacct/intro).
                     IMPORTANT: bronze is the one accent — do not ship this live
                     pointing at an empty placeholder. Until Julia supplies the
                     real link, either fill it or repoint the button at
                     mailto:julia@jkaccountinggroup.com so it never dead-ends.

  Install steps: ../INSTALL-GMAIL.md. Make-every-email-on-brand: ../GMAIL-DEFAULTS.md.
  ===========================================================================
-->
<body style="margin:0; padding:24px; background:#F6F3EC;">

<!-- ======================= SIGNATURE (copy from here) ======================= -->
<table role="presentation" cellpadding="0" cellspacing="0" border="0" bgcolor="#FBF8F2" style="border-collapse:separate; mso-table-lspace:0pt; mso-table-rspace:0pt; background-color:#FBF8F2; border:1px solid #DAD4C6; border-radius:14px;">
  <tr>
    <td bgcolor="#FBF8F2" style="padding:20px 22px; background-color:#FBF8F2;">
      <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse; mso-table-lspace:0pt; mso-table-rspace:0pt;">
        <tr>

          <!-- Photo — teal panel shows through if the image is blocked or absent (brand fallback, never a stock face) -->
          <td width="80" valign="top" style="width:80px;">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
              <tr>
                <td width="80" height="100" bgcolor="#123841" align="center" valign="middle" style="width:80px; height:100px; background:#123841; border-radius:8px; font-size:0; line-height:0;">
                  <img src="{{PHOTO_URL}}" alt="Julia Kononova, CEO of JK Accounting Group" width="80" height="100" style="display:block; width:80px; height:100px; border:0; outline:none; text-decoration:none; -ms-interpolation-mode:bicubic; border-radius:8px;">
                </td>
              </tr>
            </table>
          </td>

          <!-- Details -->
          <td valign="top" style="border-left:1px solid #DAD4C6; padding:1px 20px 0 22px; mso-line-height-rule:exactly;">

            <!-- Name + credentials (serif, with an engraved post-nominal step) -->
            <div style="font-family:'Source Serif 4', Georgia, 'Times New Roman', serif; font-size:19px; font-weight:600; letter-spacing:-0.01em; line-height:1.2; color:#0D2A31;">Julia&nbsp;Kononova<span style="font-size:14px; font-weight:400; letter-spacing:0;">,&nbsp;MBA,&nbsp;EA</span></div>

            <!-- Role (mono kicker — literal caps + text-transform belt-and-suspenders) -->
            <div style="font-family:'IBM Plex Mono','Courier New',monospace; font-size:11px; font-weight:500; letter-spacing:0.11em; text-transform:uppercase; color:#245C66; padding-top:6px;">CEO&nbsp;&middot;&nbsp;CHIEF&nbsp;ACCOUNTANT</div>

            <!-- Contact — each field on its own line, like the old card. Phone leads (bold, tap-to-call); email + website are the teal links. -->
            <div style="font-family:'IBM Plex Sans', Arial, Helvetica, sans-serif; font-size:13px; line-height:1.7; color:#22201A; padding-top:14px;">
              <a href="tel:+17863181505" style="color:#22201A; text-decoration:none; font-weight:600;">(786)&nbsp;318-1505</a><br>
              <a href="mailto:julia@jkaccountinggroup.com" style="color:#123841; text-decoration:none; font-weight:600;">julia@jkaccountinggroup.com</a><br>
              <a href="https://www.jkaccountinggroup.com" style="color:#123841; text-decoration:none; font-weight:600;">www.jkaccountinggroup.com</a><br>
              <span style="color:#5F5849;">Miami&nbsp;&middot;&nbsp;Fort&nbsp;Lauderdale&nbsp;&middot;&nbsp;Online</span>
            </div>

            <!-- Bicultural line — the promise, in the mono family (Arial fallback carries the Cyrillic) -->
            <div style="font-family:'IBM Plex Mono','Courier New',Arial,monospace; font-size:10px; font-weight:500; letter-spacing:0.10em; text-transform:uppercase; color:#5F5849; padding-top:10px;">ENGLISH&nbsp;&middot;&nbsp;РУССКИЙ&nbsp;&middot;&nbsp;УКРАЇНСЬКА</div>

            <!-- CTA — the single bronze accent, bulletproof for Outlook (mso-padding-alt + cell bgcolor) -->
            <div style="padding-top:14px;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse:separate; mso-table-lspace:0pt; mso-table-rspace:0pt;">
                <tr>
                  <td bgcolor="#9C6A39" style="background-color:#9C6A39; border-radius:8px; mso-padding-alt:11px 22px 11px 22px;">
                    <a href="{{BOOKING_URL}}" target="_blank" style="display:inline-block; padding:11px 22px; font-family:'IBM Plex Sans', Arial, Helvetica, sans-serif; font-size:13px; line-height:1; font-weight:bold; color:#FFFFFF; text-decoration:none; mso-line-height-rule:exactly;">Book a consultation&nbsp;&#8594;</a>
                  </td>
                </tr>
              </table>
            </div>

          </td>

          <!-- Medallion seal (primary, teal — the light card keeps it legible) -->
          <td width="72" valign="middle" align="right" style="width:72px; padding:0 0 0 22px; font-size:0; line-height:0;">
            <img src="{{LOGO_URL}}" alt="JK Accounting Group" width="72" height="72" style="display:block; width:72px; height:72px; border:0; outline:none; text-decoration:none; -ms-interpolation-mode:bicubic;">
          </td>

        </tr>
      </table>
    </td>
  </tr>
</table>

</body>
