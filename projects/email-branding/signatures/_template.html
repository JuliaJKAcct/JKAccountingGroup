<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JK Accounting Group — Email signature · template</title>
</head>
<!--
  ===========================================================================
  JK ACCOUNTING GROUP — EMAIL SIGNATURE TEMPLATE  (copy per team member)
  ---------------------------------------------------------------------------
  To add a teammate: copy this file to signatures/<firstname>.html and fill in
  every {{PLACEHOLDER}}. Keep the structure, colors and fonts EXACTLY — the
  whole point is that everyone's signature is identical but for their details.

  FILL THESE IN (search & replace):
    {{FIRST_NAME}}   e.g. Lilian
    {{LAST_NAME}}    e.g. Marchenko
    {{TITLE}}        e.g. Senior Accountant
    {{EMAIL}}        e.g. lilian@jkaccountinggroup.com
    {{PHONE}}        display phone, e.g. +1 (954) 555-0110
    {{PHONE_TEL}}    digits only w/ +1, e.g. +19545550110
    {{WEBSITE}}      domain only, e.g. jkaccountinggroup.com
    {{BOOKING_URL}}  full link, or delete the CTA block if this person has none
    {{LOGO_URL}}     public HTTPS URL of the logo PNG (see ../INSTALL-GMAIL.md)

  Rules: bronze appears ONCE (the button). Never recolor, box, or swap the logo.
  Never add web fonts, background images, or extra colors — see ../EMAIL-STYLE-GUIDE.md.
  ===========================================================================
-->
<body style="margin:0; padding:24px; background:#F6F3EC;">

<!-- ======================= SIGNATURE (copy from here) ======================= -->
<table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse; background:transparent;">
  <tr>
    <!-- Logo -->
    <td valign="top" style="padding:2px 24px 0 0;">
      <a href="https://{{WEBSITE}}" style="text-decoration:none;">
        <img src="{{LOGO_URL}}" alt="JK Accounting Group" width="80" height="80" style="display:block; width:80px; height:80px; border:0; outline:none;">
      </a>
    </td>

    <!-- Details -->
    <td valign="top" style="padding:0 0 0 24px; border-left:1px solid #DAD4C6;">

      <div style="font-family:'Source Serif 4', Georgia, 'Times New Roman', serif; font-size:19px; font-weight:600; letter-spacing:-0.01em; line-height:1.2; color:#0D2A31;">
        {{FIRST_NAME}}&nbsp;{{LAST_NAME}}
      </div>

      <div style="font-family:'IBM Plex Mono','Courier New',monospace; font-size:11px; font-weight:500; letter-spacing:0.11em; text-transform:uppercase; color:#245C66; margin-top:6px;">
        {{TITLE}}&nbsp;&middot;&nbsp;JK&nbsp;Accounting&nbsp;Group
      </div>

      <div style="height:1px; line-height:1px; font-size:0; background:#DAD4C6; margin:13px 0; width:250px;">&nbsp;</div>

      <div style="font-family:'IBM Plex Sans', Arial, Helvetica, sans-serif; font-size:13px; line-height:1.75; color:#22201A;">
        <a href="mailto:{{EMAIL}}" style="color:#123841; text-decoration:none; font-weight:600;">{{EMAIL}}</a><br>
        <a href="tel:{{PHONE_TEL}}" style="color:#22201A; text-decoration:none;">{{PHONE}}</a>
        <span style="color:#C5BEAD;">&nbsp;&nbsp;&middot;&nbsp;&nbsp;</span>
        <a href="https://{{WEBSITE}}" style="color:#123841; text-decoration:none; font-weight:600;">{{WEBSITE}}</a><br>
        <span style="color:#5F5849;">Miami&nbsp;&middot;&nbsp;Fort&nbsp;Lauderdale&nbsp;&middot;&nbsp;Online</span>
      </div>

      <div style="font-family:'IBM Plex Mono','Courier New',monospace; font-size:10px; letter-spacing:0.09em; color:#5F5849; margin-top:11px;">
        ENGLISH&nbsp;&middot;&nbsp;РУССКИЙ&nbsp;&middot;&nbsp;УКРАЇНСЬКА
      </div>

      <!-- CTA — the single bronze accent. Delete this whole block if no booking link. -->
      <div style="margin-top:15px;">
        <a href="{{BOOKING_URL}}" style="font-family:'IBM Plex Sans', Arial, Helvetica, sans-serif; font-size:12.5px; font-weight:600; color:#FFFFFF; background:#9C6A39; text-decoration:none; padding:10px 20px; border-radius:8px; display:inline-block;">
          Book&nbsp;a&nbsp;consultation&nbsp;&rarr;
        </a>
      </div>

    </td>
  </tr>
</table>
<!-- ======================== SIGNATURE (copy to here) ======================== -->

</body>
</html>
