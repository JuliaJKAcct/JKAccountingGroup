<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JK Accounting Group — Email signature · template</title>
</head>
<!--
  ===========================================================================
  JK ACCOUNTING GROUP — EMAIL SIGNATURE TEMPLATE  (copy per team member)
  ---------------------------------------------------------------------------
  Copy this file to signatures/<firstname>.html and fill in every {{PLACEHOLDER}}.
  Keep the structure, colors and fonts EXACTLY — everyone's signature is
  identical but for their own details.

  Business-card grammar, PETITE + TRIMMED (~390px, kept low): petrol-teal panel
  (emblem + wordmark + EST. MIAMI) beside an ivory panel with the bronze
  diamond, the DIRECT / EMAIL / WEB / OFFICE label rows, and one bronze "Book a
  consultation" text link (no big button, no tagline). Email-safe (tables +
  inline CSS), dark-mode-safe, Outlook/Word hardened.

  FILL THESE IN (search for "{{" to be sure none remain):
    {{FIRST_NAME}}   e.g. Lilian
    {{LAST_NAME}}    e.g. Marchenko
    {{CREDENTIALS}}  post-nominals incl. leading comma, or delete the span — e.g. ", CPA"
    {{ROLE_CAPS}}    role in CAPS, middot-separated — e.g. SENIOR ACCOUNTANT
    {{EMAIL}}        e.g. lilian@jkaccountinggroup.com
    {{PHONE}}        display phone — e.g. (954) 555-0110
    {{PHONE_TEL}}    digits only w/ +1 — e.g. +19545550110
    {{BOOKING_URL}}  full booking link, or point it at mailto:<email> if none.

  ONE image only — the emblem in the teal panel. To install, UPLOAD it in Gmail
  (Insert image → Upload) — Google hosts it, no website needed. File:
  ../../../brand/logo/png/JK-emblem-reversed-512.png. See ../INSTALL-GMAIL.md.
  Rules: bronze stays rare — the small diamond ◆ and the booking link.
  Never recolor/box/stretch the logo.
  ===========================================================================
-->
<body style="margin:0; padding:24px; background:#F6F3EC;">

<!-- ======================= SIGNATURE (copy from here) ======================= -->
<table role="presentation" cellpadding="0" cellspacing="0" border="0" bgcolor="#FBF8F2" style="border-collapse:separate; mso-table-lspace:0pt; mso-table-rspace:0pt; background-color:#FBF8F2; border:1px solid #DAD4C6; border-radius:12px;">
  <tr>

    <!-- Panel A — petrol teal (matches the emblem PNG tile #123841, no box) -->
    <td width="92" valign="middle" align="center" bgcolor="#123841" style="width:92px; background-color:#123841; border-radius:12px 0 0 12px; padding:14px 10px;">
      <img src="../../../brand/logo/png/JK-emblem-reversed-512.png" alt="JK Accounting Group" width="38" height="38" style="display:block; margin:0 auto; width:38px; height:38px; border:0; outline:none; -ms-interpolation-mode:bicubic;">
      <div style="font-family:'Source Serif 4', Georgia, 'Times New Roman', serif; font-size:10px; font-weight:600; line-height:1.25; letter-spacing:-0.01em; color:#ECE6DA; padding-top:7px;">JK&nbsp;Accounting<br>Group</div>
      <div style="font-family:'IBM Plex Mono','Courier New',monospace; font-size:6px; font-weight:500; letter-spacing:0.16em; color:#CFA268; padding-top:4px;">EST.&nbsp;MIAMI</div>
    </td>

    <!-- Panel B — ivory: the details -->
    <td valign="middle" bgcolor="#FBF8F2" style="background-color:#FBF8F2; border-radius:0 12px 12px 0; padding:13px 16px; mso-line-height-rule:exactly;">

      <div style="font-family:'Source Serif 4', Georgia, 'Times New Roman', serif; font-size:15px; font-weight:600; letter-spacing:-0.01em; line-height:1.2; color:#0D2A31;">{{FIRST_NAME}}&nbsp;{{LAST_NAME}}<span style="font-size:11.5px; font-weight:400; letter-spacing:0;">{{CREDENTIALS}}</span><span style="color:#9C6A39; font-size:9px; padding-left:5px;">&#9670;</span></div>

      <div style="font-family:'IBM Plex Mono','Courier New',monospace; font-size:8.5px; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; color:#245C66; padding-top:4px;">{{ROLE_CAPS}}</div>

      <div style="height:1px; line-height:1px; font-size:0; background:#E4DECF; margin:8px 0;">&nbsp;</div>

      <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
        <tr>
          <td valign="top" style="font-family:'IBM Plex Mono','Courier New',monospace; font-size:8px; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; color:#245C66; padding:0 10px 4px 0; white-space:nowrap;">Direct</td>
          <td valign="top" style="font-family:'IBM Plex Sans', Arial, Helvetica, sans-serif; font-size:11px; line-height:1.2; padding:0 0 4px 0;"><a href="tel:{{PHONE_TEL}}" style="color:#22201A; text-decoration:none; font-weight:600;">{{PHONE}}</a></td>
        </tr>
        <tr>
          <td valign="top" style="font-family:'IBM Plex Mono','Courier New',monospace; font-size:8px; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; color:#245C66; padding:0 10px 4px 0; white-space:nowrap;">Email</td>
          <td valign="top" style="font-family:'IBM Plex Sans', Arial, Helvetica, sans-serif; font-size:11px; line-height:1.2; padding:0 0 4px 0;"><a href="mailto:{{EMAIL}}" style="color:#123841; text-decoration:none; font-weight:600;">{{EMAIL}}</a></td>
        </tr>
        <tr>
          <td valign="top" style="font-family:'IBM Plex Mono','Courier New',monospace; font-size:8px; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; color:#245C66; padding:0 10px 4px 0; white-space:nowrap;">Web</td>
          <td valign="top" style="font-family:'IBM Plex Sans', Arial, Helvetica, sans-serif; font-size:11px; line-height:1.2; padding:0 0 4px 0;"><a href="https://www.jkaccountinggroup.com" style="color:#123841; text-decoration:none; font-weight:600;">www.jkaccountinggroup.com</a></td>
        </tr>
        <tr>
          <td valign="top" style="font-family:'IBM Plex Mono','Courier New',monospace; font-size:8px; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; color:#245C66; padding:0 10px 0 0; white-space:nowrap;">Office</td>
          <td valign="top" style="font-family:'IBM Plex Sans', Arial, Helvetica, sans-serif; font-size:11px; line-height:1.2; color:#5F5849;">Miami&nbsp;&middot;&nbsp;Fort&nbsp;Lauderdale&nbsp;&middot;&nbsp;Online</td>
        </tr>
      </table>

      <!-- Booking — a light bronze text link (the single action). Point at mailto:{{EMAIL}} if no booking link. -->
      <div style="padding-top:9px;">
        <a href="{{BOOKING_URL}}" style="font-family:'IBM Plex Sans', Arial, Helvetica, sans-serif; font-size:10.5px; font-weight:700; letter-spacing:0.02em; color:#9C6A39; text-decoration:none;">Book a consultation&nbsp;&#8594;</a>
      </div>

    </td>
  </tr>
</table>
<!-- ======================== SIGNATURE (copy to here) ======================== -->

</body>
</html>
