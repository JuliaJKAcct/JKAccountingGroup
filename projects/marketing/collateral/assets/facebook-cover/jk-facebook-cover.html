<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>JK Accounting Group — Facebook cover (1640×624)</title>
<!--
  JK Accounting Group — Facebook Page cover photo.
  Canvas: 1640×624 px (Facebook's recommended high-res upload; displays 820×312 desktop / 640×360 mobile).
  All content sits inside the central mobile-safe band and clears the bottom-left corner
  (where the profile picture overlaps). Colors, type, and the medallion are the JK design system —
  see brand/JK-Brand-Guide.md. Regenerate the PNG by screenshotting the .stage element at 1640×624.
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,400&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --teal-800:#123841; --deep:#0D2A31; --darkest:#091F24;
    --ivory:#ECE6DA; --ivory-muted:#9FB3B6;
    --bronze:#9C6A39; --bronze-light:#CFA268; --bronze-ink:#7E5430;
    --hair:rgba(236,230,218,.14);
    --serif:'Source Serif 4',Georgia,serif;
    --sans:'IBM Plex Sans',system-ui,sans-serif;
    --mono:'IBM Plex Mono',ui-monospace,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#0D2A31}
  .stage{
    position:relative;width:1640px;height:624px;overflow:hidden;
    background:radial-gradient(120% 140% at 68% 42%, #17434d 0%, #123841 34%, #0D2A31 66%, #091F24 100%);
    -webkit-font-smoothing:antialiased;text-rendering:geometricPrecision;font-kerning:normal;
  }
  .topline,.botline{position:absolute;left:0;right:0;height:1px;background:var(--hair)}
  .topline{top:0}.botline{bottom:0}

  .content{
    position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:1060px;height:100%;                 /* inset from the mobile-safe band */
    display:flex;align-items:center;justify-content:space-between;gap:56px;padding:0 4px;
  }
  /* left — value + services */
  .left{flex:1 1 auto;max-width:632px}
  .kicker{
    font-family:var(--mono);font-weight:500;font-size:13.5px;letter-spacing:.24em;
    text-transform:uppercase;color:var(--ivory-muted);margin-bottom:19px;
  }
  .headline{
    font-family:var(--serif);font-weight:600;font-size:51px;line-height:1.03;
    letter-spacing:-.014em;color:var(--ivory);text-wrap:balance;
  }
  .rule{width:64px;height:2px;background:var(--bronze);margin:23px 0 31px;border-radius:2px}
  .services{display:grid;grid-template-columns:1fr 1fr;column-gap:46px;max-width:600px}
  .svc{
    display:flex;align-items:center;gap:14px;padding:15px 0;border-top:1px solid var(--hair);
    font-family:var(--sans);font-weight:500;font-size:22px;letter-spacing:.002em;
    color:var(--ivory);white-space:nowrap;
  }
  .services .svc:nth-child(1),.services .svc:nth-child(2){border-top:0}
  .tick{width:7px;height:7px;flex:0 0 auto;transform:rotate(45deg);border:1.5px solid var(--bronze-light);opacity:.85}
  /* right — medallion + url */
  .right{position:relative;flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:20px}
  .glow{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) translateY(-20px);
    width:560px;height:560px;border-radius:50%;pointer-events:none;z-index:0;
    background:radial-gradient(circle, rgba(236,230,218,.09) 0%, rgba(207,162,104,.05) 34%, rgba(23,67,77,0) 66%);
  }
  .halo{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) translateY(-20px);
    width:470px;height:470px;border-radius:50%;pointer-events:none;z-index:0;
    border:1px solid rgba(236,230,218,.055);
  }
  .medallion{width:296px;height:296px;display:block;position:relative;z-index:1}
  .url{
    position:relative;z-index:1;font-family:var(--mono);font-weight:400;font-size:15px;
    letter-spacing:.06em;color:var(--ivory-muted);
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="topline"></div><div class="botline"></div>
    <div class="content">
      <div class="left">
        <div class="kicker">Miami &nbsp;&middot;&nbsp; Fort Lauderdale &nbsp;&middot;&nbsp; Online</div>
        <h1 class="headline">Clarity and confidence in your numbers.</h1>
        <div class="rule"></div>
        <div class="services">
          <div class="svc"><span class="tick"></span>Business Registration</div>
          <div class="svc"><span class="tick"></span>Process Automation</div>
          <div class="svc"><span class="tick"></span>Sales Tax Reporting</div>
          <div class="svc"><span class="tick"></span>Tax Preparation</div>
          <div class="svc"><span class="tick"></span>Accounting &amp; Bookkeeping</div>
          <div class="svc"><span class="tick"></span>CFO Services</div>
        </div>
      </div>
      <div class="right">
        <div class="glow"></div>
        <div class="halo"></div>
        <!-- JK Medallion (reversed) — approved brand asset, from brand/logo/svg/JK-medallion-reversed.svg -->
        <svg class="medallion" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <path id="arcTop" d="M20.9 51.7 A40 40 0 0 1 99.1 51.7" fill="none"></path>
            <path id="arcBot" d="M20.9 68.3 A40 40 0 0 0 99.1 68.3" fill="none"></path>
          </defs>
          <circle cx="60" cy="60" r="57" fill="none" stroke="#ECE6DA" stroke-width="3"></circle>
          <circle cx="60" cy="60" r="50.5" fill="none" stroke="#CFA268" stroke-width="1"></circle>
          <text font-family="'IBM Plex Mono',monospace" font-size="6" letter-spacing="1.6" fill="#ECE6DA" text-anchor="middle"><textPath href="#arcTop" startOffset="50%">JK ACCOUNTING GROUP</textPath></text>
          <text font-family="'IBM Plex Mono',monospace" font-size="5" letter-spacing="1.4" fill="#ECE6DA" text-anchor="middle"><textPath href="#arcBot" startOffset="50%">TAX · BOOKKEEPING · CFO</textPath></text>
          <g fill="#CFA268">
            <path d="M7 56.5 l3.5 3.5 -3.5 3.5 -3.5 -3.5 z"></path>
            <path d="M113 56.5 l3.5 3.5 -3.5 3.5 -3.5 -3.5 z"></path>
          </g>
          <g transform="translate(60,60) scale(0.44) translate(-59,-56)">
            <g fill="none" stroke="#ECE6DA" stroke-width="9" stroke-linecap="butt" stroke-linejoin="miter">
              <path d="M55 26 L55 70 Q55 86 39 86 Q26 86 23.5 74.5"></path>
              <path d="M70 26 L70 86"></path>
              <path d="M70 56 L92 26"></path>
              <path d="M70 56 L95 86"></path>
            </g>
          </g>
        </svg>
        <div class="url">jkaccountinggroup.com</div>
      </div>
    </div>
  </div>
</body>
</html>
