<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>JK Accounting Group — Facebook cover · black (1640×624)</title>
<!--
  JK Accounting Group — Facebook Page cover (Julia redesign, "black" option).
  Canvas 1640×624 (Facebook high-res upload). Screenshot the #stage element at 1640×624 to export.
  Mobile-safe: single big headline + Julia, both kept inside the central band; copy lifted so the
  round profile picture (lower-left) never covers it. Colors/type/logo = JK design system
  (see brand/JK-Brand-Guide.md). Photo: real team photography, background removed.
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--ivory:#ECE6DA;--ivory-muted:#9FB3B6;--bronze:#9C6A39;
    --serif:'Source Serif 4',Georgia,serif;--sans:'IBM Plex Sans',system-ui,sans-serif;--mono:'IBM Plex Mono',ui-monospace,monospace;}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#0D2A31}
  .stage{position:relative;width:1640px;height:624px;overflow:hidden;
    background:radial-gradient(125% 150% at 66% 44%, #16424B 0%, #123841 32%, #0D2A31 64%, #091F24 100%);
    -webkit-font-smoothing:antialiased;text-rendering:geometricPrecision;font-kerning:normal;}
  /* concentric rings — subtle depth, echoes the Medallion */
  .ring{position:absolute;top:50%;left:66%;transform:translate(-50%,-50%);width:900px;height:900px;border-radius:50%;border:1px solid rgba(236,230,218,.05)}
  .ring2{position:absolute;top:50%;left:66%;transform:translate(-50%,-50%);width:1240px;height:1240px;border-radius:50%;border:1px solid rgba(236,230,218,.03)}
  /* soft spotlight lifts Julia off the dark field */
  .spot{position:absolute;top:42%;left:70%;transform:translate(-50%,-50%);width:780px;height:780px;border-radius:50%;
    background:radial-gradient(circle, rgba(236,230,218,.12) 0%, rgba(207,162,104,.06) 38%, rgba(22,66,75,0) 68%);}
  .topline,.botline{position:absolute;left:0;right:0;height:1px;background:rgba(236,230,218,.12)}
  .topline{top:0}.botline{bottom:0}
  /* Julia — top-anchored so the face stays in frame; body bleeds off the bottom */
  .julia{position:absolute;top:34px;right:255px;height:1000px;width:auto;z-index:2;
    filter:drop-shadow(0 24px 60px rgba(9,31,36,.5));}
  /* copy — inside the central mobile-safe band, lifted clear of the profile-picture corner */
  .copy{position:absolute;left:340px;top:76px;width:600px;z-index:3;display:flex;flex-direction:column;}
  .kicker{font-family:var(--mono);font-weight:500;font-size:14px;letter-spacing:.26em;text-transform:uppercase;color:var(--ivory-muted);margin-bottom:24px}
  .headline{font-family:var(--serif);font-weight:600;font-size:82px;line-height:1.0;letter-spacing:-.02em;color:var(--ivory);text-wrap:balance}
  .rule{width:70px;height:3px;background:var(--bronze);border-radius:2px;margin:30px 0 26px}
  .sub{font-family:var(--sans);font-weight:400;font-size:23px;line-height:1.4;color:var(--ivory-muted);white-space:nowrap}
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="ring2"></div><div class="ring"></div><div class="spot"></div>
    <div class="topline"></div><div class="botline"></div>
    <img class="julia" src="img/julia-black.png" alt="Julia, JK Accounting Group">
    <div class="copy">
      <div class="kicker">Miami &nbsp;&middot;&nbsp; Fort Lauderdale &nbsp;&middot;&nbsp; Online</div>
      <h1 class="headline">Your US Finance Department</h1>
      <div class="rule"></div>
      <div class="sub">Proactive tax planning, bookkeeping &amp; CFO.</div>
    </div>
  </div>
</body>
</html>
